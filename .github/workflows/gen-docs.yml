name: Generate and Publish Docs

on:
  push:
    tags:
      - 'v*'  # Only on version tags like v0.1.0
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install mdBook
        run: cargo install mdbook --version 0.4.36

      - name: Build cargo docs
        run: cargo doc --no-deps --release

      - name: Build mdBook
        run: mdbook build

      - name: Prepare site directory
        run: |
          mkdir -p site
          cp -r target/doc site/rustdoc
          cp -r book site/mdbook

      - name: Upload site directory as artifact (for Pages)
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site

      - name: Create zip archives for Release
        run: |
          mkdir dist
          zip -r dist/rustdoc.zip target/doc
          zip -r dist/mdbook.zip book

      - name: Upload zips to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/rustdoc.zip
            dist/mdbook.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}   # ← use PAT here
  
  deploy-pages:
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

      - name: Confirm published contents
        run: |
          echo "--- site contents ---"
          find site
