name: Generate and Publish Docs

on:
  push:
    tags:
      - 'v*'  # Run only on version tags like v0.1.0
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install mdBook
        run: cargo install mdbook --version 0.4.36

      - name: Build cargo doc
        run: cargo doc --no-deps --release

      - name: Build mdBook
        run: mdbook build

      - name: Prepare site for GitHub Pages
        run: |
          mkdir -p site
          cp -r target/doc site/rustdoc
          cp -r book site/mdbook

      - name: Create zip archives for GitHub Release
        run: |
          mkdir dist
          zip -r dist/rustdoc.zip target/doc
          zip -r dist/mdbook.zip book

      - name: Upload docs to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/rustdoc.zip
            dist/mdbook.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Rebuild docs
        run: |
          echo "--- rebuild docs ---" 
          cargo doc --no-deps --release
          cargo install mdbook
          mdbook build
          mkdir -p site
          cp -r target/doc site/rustdoc
          cp -r book site/mdbook 

      - name: Set up Git identity
        run: |
          echo "--- setup Git Identity ---" 
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Download build artifacts
        run: |
          echo "--- download build artifacts ---"
          mkdir site
          cp -r target/doc site/rustdoc
          cp -r book site/mdbook

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

      - name: List generated files
        run: |
          echo "--- site/rustdoc ---"
          ls -al site/rustdoc || echo "No rustdoc"
          echo "--- site/mdbook ---"
          ls -al site/mdbook || echo "No mdbook"
        