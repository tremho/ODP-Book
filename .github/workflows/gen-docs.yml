name: Generate and Publish Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install mdBook
        run: cargo install mdbook --version 0.4.36

      - name: Build cargo docs
        run: cargo doc --no-deps --release

      - name: Build mdBook
        run: mdbook build

      - name: Prepare site directory
        run: |
          mkdir -p site
          cp -r target/doc site/rustdoc
          cp -r book site/mdbook

      - name: Upload site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site

      - name: Create zip archives for release
        run: |
          mkdir dist
          zip -r dist/rustdoc.zip target/doc
          zip -r dist/mdbook.zip book

      - name: Set release tag env var
        run: echo "TAG_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV
  
      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh
  
      - name: Create GitHub Release if not exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            gh release create "$TAG_NAME" --repo "$GITHUB_REPOSITORY" \
              -t "$TAG_NAME" -n "Documentation release for $TAG_NAME"
          fi

      - name: Upload zip files to GitHub Release using gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
         gh release upload "$TAG_NAME" dist/*.zip --clobber --repo "$GITHUB_REPOSITORY"
    
  deploy-pages:
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: site

      - name: Debug site folder contents
        run: |
          echo "Contents of site:"
          find site

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
